name: Publish to NuGet

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore src/OfxFileReader/OfxFileReader.csproj

      - name: Build
        run: dotnet build src/OfxFileReader/OfxFileReader.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/OfxFileReader/OfxFileReader.csproj --configuration Release --no-build --output ./artifacts

      - name: Authenticate with NuGet (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: Jonata

      - name: Publish
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}